<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campagnes de Facturation - E-NOVATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .tab-button.active {
            border-color: #2563eb;
            color: #2563eb;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900">
    <!-- Header -->
    <header class="bg-white dark:bg-gray-800 shadow-sm border-b border-gray-200 dark:border-gray-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <a href="/dashboard" class="text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white">
                        <i class="fas fa-arrow-left"></i>
                    </a>
                    <h1 class="text-2xl font-bold text-gray-900 dark:text-white">
                        📋 Campagnes de Facturation
                    </h1>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Tabs -->
        <div class="mb-6 border-b border-gray-200 dark:border-gray-700">
            <nav class="flex gap-4">
                <button onclick="switchTab('pour')" id="tab-pour" class="tab-button active px-4 py-2 font-medium border-b-2 transition-colors">
                    Pour Facturation (<span id="count-pour">0</span>)
                </button>
                <button onclick="switchTab('pas')" id="tab-pas" class="tab-button px-4 py-2 font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-300 transition-colors">
                    A ne pas facturer (<span id="count-pas">0</span>)
                </button>
            </nav>
        </div>

        <!-- Loading -->
        <div id="loading" class="text-center py-12">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
            <p class="mt-4 text-gray-600 dark:text-gray-400">Chargement des campagnes...</p>
        </div>

        <!-- Error -->
        <div id="error" class="hidden bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg p-4">
            <div class="flex items-center gap-2 text-red-800 dark:text-red-400">
                <i class="fas fa-exclamation-circle"></i>
                <span id="error-message"></span>
            </div>
        </div>

        <!-- Campaigns Containers -->
        <div id="campaigns-pour" class="hidden space-y-4"></div>
        <div id="campaigns-pas" class="hidden space-y-4"></div>
    </main>

    <script>
        let campaignsPour = [];
        let campaignsPas = [];
        let currentTab = 'pour';

        function switchTab(tab) {
            currentTab = tab;
            
            // Update tab buttons
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active', 'border-blue-600', 'text-blue-600');
                btn.classList.add('border-transparent', 'text-gray-500');
            });
            
            const activeBtn = document.getElementById(`tab-${tab}`);
            activeBtn.classList.add('active', 'border-blue-600', 'text-blue-600');
            activeBtn.classList.remove('border-transparent', 'text-gray-500');
            
            // Show/hide containers
            document.getElementById('campaigns-pour').classList.toggle('hidden', tab !== 'pour');
            document.getElementById('campaigns-pas').classList.toggle('hidden', tab !== 'pas');
        }

        async function loadCampaigns() {
            try {
                // Récupérer les données Trello
                const trelloResponse = await fetch('/api/trello?env=prod');
                if (!trelloResponse.ok) throw new Error('Erreur chargement Trello');
                
                const trelloData = await trelloResponse.json();

                if (!trelloData.data || !trelloData.data.lanes) {
                    throw new Error('Données Trello invalides');
                }

                const allCards = trelloData.data.lanes.flatMap(lane => lane.cards || []);
                
                // Séparer les campagnes
                campaignsPour = allCards.filter(card => {
                    const title = card.title?.toLowerCase() || '';
                    return title.includes('pour facturation');
                });
                
                campaignsPas = allCards.filter(card => {
                    const title = card.title?.toLowerCase() || '';
                    return title.includes('ne pas facturer') || title.includes('a ne pas facturer');
                });

                console.log(`📋 ${campaignsPour.length} campagnes "Pour Facturation"`);
                console.log(`📋 ${campaignsPas.length} campagnes "A ne pas facturer"`);

                // Récupérer les noms Nova et ADX pour toutes les campagnes
                await enrichWithNovaNames(campaignsPour);
                await enrichWithNovaNames(campaignsPas);
                await enrichWithADXNames(campaignsPour);
                await enrichWithADXNames(campaignsPas);

                // Mettre à jour les compteurs
                document.getElementById('count-pour').textContent = campaignsPour.length;
                document.getElementById('count-pas').textContent = campaignsPas.length;

                // Rendre les campagnes
                renderCampaigns('pour', campaignsPour);
                renderCampaigns('pas', campaignsPas);

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('campaigns-pour').classList.remove('hidden');

            } catch (error) {
                console.error('Erreur:', error);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('error').classList.remove('hidden');
                document.getElementById('error-message').textContent = error.message;
            }
        }

        async function enrichWithNovaNames(campaigns) {
            const novaIds = campaigns
                .map(c => {
                    const match = c.novaCampaignUrl?.match(/\/campaign\/(\d+)/);
                    return match ? parseInt(match[1]) : null;
                })
                .filter(id => id !== null);

            if (novaIds.length === 0) return;

            try {
                const response = await fetch('/api/nova/campaigns/names', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ campaignIds: novaIds })
                });
                const data = await response.json();
                
                if (data.success) {
                    console.log('✅ Noms Nova récupérés:', data.campaigns);
                    campaigns.forEach(campaign => {
                        const match = campaign.novaCampaignUrl?.match(/\/campaign\/(\d+)/);
                        if (match) {
                            const novaId = parseInt(match[1]);
                            campaign.novaCampaignName = data.campaigns[novaId] || null;
                            if (campaign.novaCampaignName) {
                                console.log(`✅ ${campaign.title} → Nova: ${campaign.novaCampaignName}`);
                            }
                        }
                    });
                }
            } catch (error) {
                console.error('Erreur récupération noms Nova:', error);
            }
        }

        async function enrichWithADXNames(campaigns) {
            const adxIds = campaigns
                .map(c => {
                    const match = c.adxCampaignUrl?.match(/\/campaigns\/view\/(\d+)/);
                    return match ? parseInt(match[1]) : null;
                })
                .filter(id => id !== null);

            if (adxIds.length === 0) return;

            try {
                const response = await fetch('/api/adx/campaigns/names', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ campaignIds: adxIds })
                });
                const data = await response.json();
                
                if (data.success) {
                    console.log('✅ Noms ADX récupérés:', data.campaigns);
                    campaigns.forEach(campaign => {
                        const match = campaign.adxCampaignUrl?.match(/\/campaigns\/view\/(\d+)/);
                        if (match) {
                            const adxId = parseInt(match[1]);
                            campaign.adxCampaignName = data.campaigns[adxId] || null;
                            if (campaign.adxCampaignName) {
                                console.log(`✅ ${campaign.title} → ADX: ${campaign.adxCampaignName}`);
                            } else {
                                console.log(`⚠️ ${campaign.title} → Pas de nom ADX pour ID ${adxId}`);
                            }
                        }
                    });
                }
            } catch (error) {
                console.error('Erreur récupération noms ADX:', error);
            }
        }

        function renderCampaigns(type, campaigns) {
            const container = document.getElementById(`campaigns-${type}`);
            container.innerHTML = '';

            campaigns.forEach(campaign => {
                const card = createCampaignCard(campaign);
                container.appendChild(card);
            });
        }

        function createCampaignCard(campaign) {
            const div = document.createElement('div');
            div.className = 'bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 p-6 hover:shadow-md transition-shadow';

            const title = campaign.title || 'Sans nom';
            const trader = campaign.trader || 'N/A';
            const commercial = campaign.commercial || 'N/A';
            const startDate = campaign.dates?.startingDateFormatted || 'N/A';
            const endDate = campaign.dates?.endingDateFormatted || 'N/A';
            const novaUrl = campaign.novaCampaignUrl || '';
            const adxUrl = campaign.adxCampaignUrl || '';
            const adxCampaignName = campaign.adxCampaignName || null;

            div.innerHTML = `
                <div class="flex items-start justify-between mb-4">
                    <h3 class="text-lg font-semibold text-gray-900 dark:text-white flex-1">
                        ${title}
                    </h3>
                    <span class="ml-2 px-2 py-1 text-xs font-medium rounded bg-orange-100 text-orange-800 dark:bg-orange-900/30 dark:text-orange-400">
                        Facturation
                    </span>
                </div>

                <!-- Noms Nova et ADX -->
                <div class="mb-4 space-y-2">
                    ${campaign.novaCampaignName ? `
                        <div class="p-3 bg-blue-50 dark:bg-blue-900/20 rounded border border-blue-200 dark:border-blue-800">
                            <div class="flex items-start gap-2 text-blue-900 dark:text-blue-300">
                                <i class="fas fa-tag mt-1"></i>
                                <div class="flex-1">
                                    <div class="font-semibold text-xs uppercase tracking-wide mb-1">Nom Nova</div>
                                    <div class="text-sm">${campaign.novaCampaignName}</div>
                                </div>
                            </div>
                        </div>
                    ` : ''}
                    ${adxCampaignName ? `
                        <div class="p-3 bg-purple-50 dark:bg-purple-900/20 rounded border border-purple-200 dark:border-purple-800">
                            <div class="flex items-start gap-2 text-purple-900 dark:text-purple-300">
                                <i class="fas fa-tag mt-1"></i>
                                <div class="flex-1">
                                    <div class="font-semibold text-xs uppercase tracking-wide mb-1">Nom ADX</div>
                                    <div class="text-sm">${adxCampaignName}</div>
                                </div>
                            </div>
                        </div>
                    ` : ''}
                </div>

                <div class="space-y-2 text-sm">
                    <div class="flex items-center gap-2 text-gray-600 dark:text-gray-400">
                        <i class="fas fa-user w-4"></i>
                        <span><strong>Trader:</strong> ${trader}</span>
                    </div>
                    <div class="flex items-center gap-2 text-gray-600 dark:text-gray-400">
                        <i class="fas fa-briefcase w-4"></i>
                        <span><strong>Commercial:</strong> ${commercial}</span>
                    </div>
                    <div class="flex items-center gap-2 text-gray-600 dark:text-gray-400">
                        <i class="fas fa-calendar w-4"></i>
                        <span><strong>Dates:</strong> ${startDate} → ${endDate}</span>
                    </div>
                </div>

                <div class="mt-4 flex gap-2">
                    ${novaUrl ? `<a href="${novaUrl}" target="_blank" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white text-sm rounded flex items-center gap-2">
                        <i class="fas fa-external-link-alt"></i> Nova
                    </a>` : ''}
                    ${adxUrl ? `<a href="${adxUrl}" target="_blank" class="px-3 py-1.5 bg-purple-600 hover:bg-purple-700 text-white text-sm rounded flex items-center gap-2">
                        <i class="fas fa-external-link-alt"></i> ADX
                    </a>` : ''}
                </div>
            `;

            return div;
        }

        // Load campaigns on page load
        loadCampaigns();
    </script>
</body>
</html>
